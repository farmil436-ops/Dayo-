<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in to your account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
        }

        .paypal-logo {
            font-style: italic;
            font-weight: 900;
            font-size: 32px;
            color: #003087;
            display: flex;
            justify-content: center;
            align-items: center;
            letter-spacing: -1.5px;
        }

        .paypal-logo span {
            color: #009cde;
        }

        .input-field {
            transition: all 0.2s ease-in-out;
            border: 1px solid #888d94;
        }

        .input-field:focus-within {
            border-color: #0070ba;
            box-shadow: 0 0 0 1px #0070ba;
        }

        .btn-primary {
            background-color: #0070ba;
            transition: background-color 0.2s;
        }

        .btn-primary:hover {
            background-color: #005ea6;
        }

        .btn-outline {
            border: 1px solid #0070ba;
            color: #0070ba;
        }

        .btn-outline:hover {
            background-color: #f5faff;
        }

        .footer-link:hover {
            text-decoration: underline;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top: 3px solid #ffffff;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: none;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .hidden-step {
            display: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <div class="flex-grow flex items-center justify-center px-4 pt-12 pb-24">
        <div class="w-full max-w-[460px]">
            
            <!-- Logo -->
            <div class="paypal-logo mb-10">
                Pay<span>Pal</span>
            </div>

            <!-- Form Container -->
            <div id="loginForm">
                
                <!-- STEP 1: Email -->
                <div id="step1" class="space-y-6">
                    <div class="relative">
                        <input type="text" id="email" placeholder="Email or mobile number" 
                               class="input-field w-full px-4 py-4 rounded-md outline-none text-[17px]">
                    </div>

                    <a href="#" class="text-[#0070ba] font-bold text-[15px] block hover:underline">Forgot email?</a>

                    <button onclick="goToStep2()" class="btn-primary w-full text-white font-bold py-3.5 rounded-full text-[16px] flex justify-center items-center">
                        <span id="btnText1">Next</span>
                        <div id="spinner1" class="spinner ml-2"></div>
                    </button>

                    <button class="w-full border border-black font-bold py-3.5 rounded-full text-[16px] flex items-center justify-center mt-4">
                        <svg class="w-5 h-5 mr-2" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 15h2v-2h-2v2zm0-4h2V7h-2v6z"/>
                        </svg>
                        Log in with Passkey
                    </button>

                    <div class="relative flex items-center py-5">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="flex-shrink mx-4 text-gray-500 text-sm">or</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                    </div>

                    <button class="w-full border border-black font-bold py-3.5 rounded-full text-[16px]">
                        Sign Up
                    </button>
                </div>

                <!-- STEP 2: Password -->
                <div id="step2" class="space-y-6 hidden-step">
                    <div class="flex items-center mb-4 cursor-pointer" onclick="backToStep1()">
                        <span class="text-sm font-semibold text-gray-600 mr-2" id="displayEmail"></span>
                        <svg class="w-4 h-4 text-[#0070ba]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </div>

                    <div class="relative">
                        <input type="password" id="password" placeholder="Password" 
                               class="input-field w-full px-4 py-4 rounded-md outline-none text-[17px]">
                    </div>

                    <a href="#" class="text-[#0070ba] font-bold text-[15px] block hover:underline">Forgot password?</a>

                    <button onclick="handleLogin()" class="btn-primary w-full text-white font-bold py-3.5 rounded-full text-[16px] flex justify-center items-center">
                        <span id="btnText2">Log In</span>
                        <div id="spinner2" class="spinner ml-2"></div>
                    </button>

                    <div class="relative flex items-center py-5">
                        <div class="flex-grow border-t border-gray-300"></div>
                        <span class="flex-shrink mx-4 text-gray-500 text-sm">or</span>
                        <div class="flex-grow border-t border-gray-300"></div>
                    </div>

                    <button class="w-full border border-black font-bold py-3.5 rounded-full text-[16px]">
                        Sign Up
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-[#f7f9fa] border-t border-gray-200 py-6 mt-auto">
        <div class="max-w-[1000px] mx-auto px-4">
            <div class="flex flex-wrap items-center justify-center space-x-4 mb-4 text-[13px] text-gray-600 font-medium">
                <div class="flex items-center cursor-pointer">
                    <img src="https://flagcdn.com/w20/us.png" class="w-5 mr-2" alt="US Flag">
                    <span>English</span>
                    <svg class="w-3 h-3 ml-1" fill="currentColor" viewBox="0 0 20 20"><path d="M5.293 7.293a1 1 0 011.414 0L10 10.586l3.293-3.293a1 1 0 111.414 1.414l-4 4a1 1 0 01-1.414 0l-4-4a1 1 0 010-1.414z"></path></svg>
                </div>
                <a href="#" class="footer-link">Français</a>
                <a href="#" class="footer-link">Español</a>
                <a href="#" class="footer-link">中文</a>
            </div>
            
            <div class="flex flex-wrap justify-center gap-x-6 gap-y-2 text-[12px] text-[#666] font-bold">
                <a href="#" class="footer-link">Contact Us</a>
                <a href="#" class="footer-link">Privacy</a>
                <a href="#" class="footer-link">Legal</a>
                <a href="#" class="footer-link">Policy Updates</a>
                <a href="#" class="footer-link">Worldwide</a>
            </div>
        </div>
    </footer>

    <script>
        function goToStep2() {
            const emailInput = document.getElementById('email');
            const btnText = document.getElementById('btnText1');
            const spinner = document.getElementById('spinner1');

            if (!emailInput.value) {
                emailInput.style.borderColor = 'red';
                return;
            }

            btnText.style.display = 'none';
            spinner.style.display = 'block';

            // Simulate loading
            setTimeout(() => {
                document.getElementById('step1').classList.add('hidden-step');
                document.getElementById('step2').classList.remove('hidden-step');
                document.getElementById('displayEmail').innerText = emailInput.value;
                
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }, 800);
        }

        function backToStep1() {
            document.getElementById('step2').classList.add('hidden-step');
            document.getElementById('step1').classList.remove('hidden-step');
        }

        function handleLogin() {
            const passInput = document.getElementById('password');
            const btnText = document.getElementById('btnText2');
            const spinner = document.getElementById('spinner2');

            if (!passInput.value) {
                passInput.style.borderColor = 'red';
                return;
            }

            btnText.style.display = 'none';
            spinner.style.display = 'block';

            // Final simulation
            setTimeout(() => {
                alert("This is a design clone demo. No data has been sent.");
                btnText.style.display = 'block';
                spinner.style.display = 'none';
            }, 1200);
        }

        // Simple reset error state on type
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('input', () => {
                input.style.borderColor = '#888d94';
            });
        });
    </script>
</body>
</html>
